name: Publish Assets

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'yarn'

      - run: yarn install
      - run: yarn generate

      - name: Get release tag
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      # Upload artifacts to current repo release
      - name: Create release archive
        run: zip -qq -r ../frontend-${{ steps.tag.outputs.version }}.zip .
        working-directory: dist

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: frontend-${{ steps.tag.outputs.version }}.zip

      # Push to dist repo
      - name: Publish to dist repo
        if: "!github.event.release.prerelease"
        env:
          DIST_REPO_TOKEN: ${{ secrets.DIST_REPO_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.version }}"

          git clone https://x-access-token:${DIST_REPO_TOKEN}@github.com/buggregator/frontend-dist.git dist-repo

          rm -rf dist-repo/dist
          cp -r dist/ dist-repo/dist
          cp composer.json dist-repo/composer.json

          cd dist-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Release ${TAG}"
          fi

          git tag -f "${TAG}"
          git push origin main --force
          git push origin "${TAG}" --force
